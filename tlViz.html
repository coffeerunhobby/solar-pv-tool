<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Linke Turbidity Grid Visualisation - Solar PV Tool</title>
  <link rel="stylesheet" href="vendor/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css?v=1.2.9">
  <link rel="stylesheet" href="vendor/leaflet.css"/>
  <script>
    (function () {
      var m = document.cookie.match(/(?:^|;\s*)theme=(light|dark)/);
      var dark = m ? m[1] === 'dark' : matchMedia('(prefers-color-scheme:dark)').matches;
      document.documentElement.setAttribute('data-bs-theme', dark ? 'dark' : 'light');
    })();
  </script>
</head>
<body data-page="viz-tl">

<div class="site-shell">
  <div id="site-topbar"></div>
  <div class="site-body">
    <nav id="site-stepper"></nav>
    <div class="site-content">
      <div class="viz-bar">
  <h1>🌫 Linke Turbidity Grid - back-calculated from NASA POWER MERRA-2 clear-sky GHI</h1>
  <div class="sep"></div>
  <div id="stats">
    <span>Grid: <b id="st-grid">-</b></span>
    <span>Min TL: <b id="st-min">-</b></span>
    <span>Max TL: <b id="st-max">-</b></span>
    <span>Mean TL: <b id="st-mean">-</b></span>
    <span>Visible: <b id="st-visible">-</b></span>
  </div>
</div>

<div id="map-wrap">
  <div id="map"></div>
  <canvas id="overlay"></canvas>

  <div id="controls">
    <h3>Display</h3>
    <div class="ctrl-row"><label>Month</label>
      <input type="range" id="ctrl-month" min="1" max="12" step="1" value="7">
      <span class="val" id="lbl-month">Jul</span></div>
    <div class="ctrl-row"><label>Opacity</label>
      <input type="range" id="ctrl-alpha" min="0.1" max="1" step="0.05">
      <span class="val" id="lbl-alpha"></span></div>
    <div id="loading">Loading…</div>
  </div>

  <div id="legend">
    <h3>Linke turbidity factor TL - clean to dusty</h3>
    <div id="leg-ramp"></div>
    <div class="leg-row" style="margin-top:7px"><div style="width:12px;height:12px;border-radius:2px;background:repeating-linear-gradient(135deg,#0288d1 0px,#0288d1 3px,#000 3px,#000 5px);flex-shrink:0"></div><span style="color:#8a90a0">╲╲╲ polar night (no sun)</span></div>
  </div>
      </div>
    </div>
  </div>
</div>

<div id="tooltip"></div>

<!-- shared foundation -->
<script src="vendor/bootstrap.bundle.min.js"></script>
<script src="js/i18n_en.js?v=1.2.9"></script>
<script src="js/i18n_ro.js?v=1.2.9"></script>
<script src="js/i18n.js?v=1.2.9"></script>
<script src="js/theme.js?v=1.2.9"></script>
<script src="js/project-state.js?v=1.2.9"></script>
<script src="js/site-map.js?v=1.2.9"></script>
<script src="js/share.js?v=1.2.9"></script>
<script src="js/site-nav.js?v=1.2.9"></script>

<script src="vendor/leaflet.js"></script>
<script src="js/viz-basemap.js?v=1.2.9"></script>
<script src="js/config.js?v=1.2.9"></script>
<script src="js/grid-deshuffle.js?v=1.2.9"></script>
<script src="js/tl-png.js?v=1.2.9"></script>
<script>

/* TL grid constants from config.js (TL_NLATS, TL_NLONS, TL_STEP, TL_NMONTHS, TL_LAT_MIN, TL_LON_MIN) */
const HALF = TL_STEP / 2;

let TL_DATA = null;   // Uint8Array once loaded; decode: TL = value / 20

/* Polar-night detection: returns true when the sun never rises at this lat/month.
   Uses Spencer declination + sunset hour angle; if ws≤0 it's polar night. */
const _D2R = Math.PI / 180;
const _DOY_MID = [16,47,75,106,136,167,197,228,259,289,320,350];
function isPolarNight(lat, mo) {
  const B   = 2 * Math.PI * (_DOY_MID[mo] - 1) / 365;
  const dec = 0.006918 - 0.399912*Math.cos(B) + 0.070257*Math.sin(B)
            - 0.006758*Math.cos(2*B) + 0.000907*Math.sin(2*B);
  const tmp = -Math.tan(lat * _D2R) * Math.tan(dec);
  return tmp > 1;   // ws = acos(tmp) → imaginary = polar night
}

/* ── Colour scale ─────────────────────────────────────────────────────────── */
/* Smooth ramp: deep blue (pristine) -> green -> yellow -> orange -> red -> purple (dust). */
const TL_STOPS = [
  [1.5, [  1,  87, 155]],  // #01579b exceptional - deep ocean / Antarctic
  [2.0, [ 41, 182, 246]],  // #29b6f6 pristine maritime
  [2.5, [ 76, 175,  80]],  // #4caf50 clean continental
  [3.0, [205, 220,  57]],  // #cddc39 rural background
  [4.0, [253, 216,  53]],  // #fdd835 moderate
  [5.0, [251, 140,   0]],  // #fb8c00 turbid industrial / humid tropics
  [6.0, [229,  57,  53]],  // #e53935 very turbid - Sahara, monsoon
  [7.0, [123,  31, 162]],  // #7b1fa2 extreme - dust storms
];
const tlColor = vizRamp(TL_STOPS);
document.getElementById('leg-ramp').innerHTML = vizLegendBar(TL_STOPS,
  [{ v: 1.5, label: '&le;1.5' }, { v: 3, label: '3' }, { v: 4, label: '4' },
   { v: 5, label: '5' }, { v: 7, label: '&ge;7' }]);

/* ── Map ──────────────────────────────────────────────────────────────────── */
const map = L.map('map').setView([20, 10], 3);
vizBasemap(map);   /* theme-aware Carto basemap (js/viz-basemap.js) */

/* ── Canvas overlay ───────────────────────────────────────────────────────── */
const canvas = document.getElementById('overlay');
const ctx    = canvas.getContext('2d');

function resize() {
  const r = canvas.parentElement.getBoundingClientRect();
  canvas.width  = r.width;
  canvas.height = r.height;
}

/* Hatched canvas pattern for polar-night cells */
function makePolarNightPattern(baseColor) {
  const sz = 8;
  const pc = document.createElement('canvas');
  pc.width = sz; pc.height = sz;
  const px = pc.getContext('2d');
  px.fillStyle = baseColor;
  px.fillRect(0, 0, sz, sz);
  px.strokeStyle = 'rgba(0,0,0,0.35)';
  px.lineWidth = 1;
  px.beginPath(); px.moveTo(0, sz); px.lineTo(sz, 0); px.stroke();
  return ctx.createPattern(pc, 'repeat');
}
let _polarPattern = null;

/* Pre-render the selected month's BASE colours to an offscreen canvas ONCE (NLONS x NLATS, image
   row 0 = north). draw() blits one strip per latitude row at its Mercator y; polar-night rows then
   get the hatch pattern overlaid on top (opaque, so it hides the base). O(rows) per frame. */
let gridCanvas = null, builtMonth = -1;
const _toRGB = s => s[0] === '#'
  ? [parseInt(s.slice(1, 3), 16), parseInt(s.slice(3, 5), 16), parseInt(s.slice(5, 7), 16)]
  : s.match(/\d+/g).map(Number);
/* colour LUT by raw PNG byte (px = round(tl*20)) - built once, so a month rebuild is a pure copy */
const _gridLUT = (function () { const l = new Array(256); for (let p = 0; p < 256; p++) l[p] = _toRGB(tlColor(p / 20)); return l; })();
function buildGridCanvas(mo) {
  if (!TL_DATA) return;
  gridCanvas = gridCanvas || document.createElement('canvas');
  gridCanvas.width = TL_NLONS; gridCanvas.height = TL_NLATS;
  const g = gridCanvas.getContext('2d');
  const img = g.createImageData(TL_NLONS, TL_NLATS), d = img.data;
  for (let i = 0; i < TL_NLATS; i++) {
    const base = (TL_NLATS - 1 - i) * TL_NLONS;            // image row 0 = lat +90 (north)
    const grow = (mo * TL_NLATS + i) * TL_NLONS;
    for (let j = 0; j < TL_NLONS; j++) {
      const c = _gridLUT[TL_DATA[grow + j]], o = (base + j) * 4;
      d[o] = c[0]; d[o + 1] = c[1]; d[o + 2] = c[2]; d[o + 3] = 255;
    }
  }
  g.putImageData(img, 0, 0);
  builtMonth = mo;
}

function draw() {
  if (!TL_DATA) return;
  const mo = parseInt(document.getElementById('ctrl-month').value) - 1;
  if (mo !== builtMonth) buildGridCanvas(mo);
  if (!gridCanvas) return;
  const alpha = parseFloat(document.getElementById('ctrl-alpha').value);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.imageSmoothingEnabled = false;
  _polarPattern = null;                                   // rebuilt once per draw (alpha may change)

  const bnd  = map.getBounds();
  const iMin = Math.max(0,            Math.floor((bnd.getSouth() - TL_LAT_MIN) / TL_STEP) - 1);
  const iMax = Math.min(TL_NLATS - 1, Math.ceil ((bnd.getNorth() - TL_LAT_MIN) / TL_STEP) + 1);
  if (iMax < iMin) { document.getElementById('st-visible').textContent = '0'; return; }

  const leftLon  = TL_LON_MIN - HALF;                                  // cell 0 left edge
  const rightLon = TL_LON_MIN + (TL_NLONS - 1) * TL_STEP + HALF;       // last cell right edge
  let visible = 0;
  for (const wo of [-360, 0, 360]) {                                   // canonical + world-wrap copies
    const xL = map.latLngToContainerPoint([0, leftLon  + wo]).x;
    const xR = map.latLngToContainerPoint([0, rightLon + wo]).x;
    if (xR < 0 || xL > canvas.width) continue;
    const dw = xR - xL;
    for (let i = iMin; i <= iMax; i++) {
      const lat = TL_LAT_MIN + i * TL_STEP;
      const yT = map.latLngToContainerPoint([Math.min(lat + HALF,  90), leftLon + wo]).y;
      const yB = map.latLngToContainerPoint([Math.max(lat - HALF, -90), leftLon + wo]).y;
      if (yB <= yT) continue;
      ctx.globalAlpha = alpha;
      ctx.drawImage(gridCanvas, 0, TL_NLATS - 1 - i, TL_NLONS, 1, xL, yT, dw, yB - yT);
      visible += TL_NLONS;
      if (isPolarNight(lat, mo)) {                        // overlay hatch across the whole row
        if (!_polarPattern) _polarPattern = makePolarNightPattern(tlColor(TL_DATA[(mo * TL_NLATS + i) * TL_NLONS] / 20));
        ctx.globalAlpha = Math.min(1, alpha * 1.4);
        ctx.fillStyle = _polarPattern;
        ctx.fillRect(xL, yT, dw, yB - yT);
      }
    }
  }
  document.getElementById('st-visible').textContent = '~' + visible.toLocaleString();
}

/* ── Map / window events ──────────────────────────────────────────────────── */
map.on('move zoom moveend zoomend', draw);
window.addEventListener('resize', () => { resize(); draw(); });
resize();

/* ── Tooltip ──────────────────────────────────────────────────────────────── */
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const tip = document.getElementById('tooltip');

function tlDesc(tl) {
  if (tl < 1.5) return 'exceptional (deep ocean/Antarctic)';
  if (tl < 2.0) return 'pristine maritime';
  if (tl < 2.5) return 'clean continental';
  if (tl < 3.0) return 'rural background';
  if (tl < 4.0) return 'moderate';
  if (tl < 5.0) return 'turbid (industrial/humid)';
  if (tl < 6.5) return 'very turbid (dust/monsoon)';
  return 'extreme (dust storm)';
}

/* debounce: compute + show the readout only when the mouse STOPS (was rebuilding the tooltip on
   every mousemove - heavy: lat/lon math + 12-month array + innerHTML). */
let _tipTimer = null, _tipEv = null;
function _renderTip() {
  const e = _tipEv; if (!e) return;
  if (!TL_DATA) { tip.style.display = 'none'; return; }
  const rect = canvas.getBoundingClientRect();
  const cpt  = map.containerPointToLatLng([e.clientX - rect.left, e.clientY - rect.top]);
  const lat  = cpt.lat, lon = cpt.lng;

  const iLat = Math.round((lat - TL_LAT_MIN) / TL_STEP);
  const iLon = Math.round((lon - TL_LON_MIN) / TL_STEP);
  if (iLat < 0 || iLat >= TL_NLATS || iLon < 0 || iLon >= TL_NLONS) {
    tip.style.display = 'none'; return;
  }

  const fnum = x => (+x).toFixed(2).replace(/\.?0+$/, '');   // 2 dp, strip trailing zeros
  const gLat = TL_LAT_MIN + iLat * TL_STEP;
  const gLon = TL_LON_MIN + iLon * TL_STEP;
  const mo   = parseInt(document.getElementById('ctrl-month').value) - 1;

  /* All 12 monthly TL values for this node */
  const monthly = Array.from({length: 12}, (_, m) =>
    TL_DATA[(m * TL_NLATS + iLat) * TL_NLONS + iLon] / 20
  );
  const cur = monthly[mo];
  const ann = monthly.reduce((a, b) => a + b, 0) / 12;

  tip.innerHTML =
    `<b style="color:${tlColor(cur)}">TL ${fnum(cur)}</b> - ${MONTH_NAMES[mo]}` +
    ` <span style="color:#8a90a0;font-size:10px">(${tlDesc(cur)})</span><br>` +
    `Annual mean: <b>${fnum(ann)}</b><br>` +
    `Grid node: ${gLat >= 0 ? fnum(gLat)+'°N' : fnum(-gLat)+'°S'}, ${gLon >= 0 ? fnum(gLon)+'°E' : fnum(-gLon)+'°W'}<br>` +
    `<span style="color:#8a90a0;font-size:10px">` +
    monthly.map((v, m) =>
      `<span style="color:${m === mo ? '#fff' : '#555'}">${MONTH_NAMES[m]}: <span style="color:${m===mo?tlColor(v):'#666'}">${fnum(v)}</span></span>`
    ).join(' · ') +
    `</span><br>` +
    `<span style="color:#444;font-size:10px">Cursor: ${fnum(lat)}°, ${fnum(lon)}°</span>`;

  tip.style.display = 'block';
  const tipW = tip.offsetWidth || 280;
  const left = (e.clientX + 14 + tipW > window.innerWidth)
             ? (e.clientX - tipW - 10) : (e.clientX + 14);
  tip.style.left = left + 'px';
  tip.style.top  = (e.clientY - 10) + 'px';
}
const _mapWrap = document.getElementById('map-wrap');
_mapWrap.addEventListener('mousemove', e => {
  _tipEv = { clientX: e.clientX, clientY: e.clientY };
  if (tip.style.display !== 'none') tip.style.display = 'none';   // drop the stale tip while moving
  if (_tipTimer) clearTimeout(_tipTimer);
  _tipTimer = setTimeout(_renderTip, 90);
});
_mapWrap.addEventListener('mouseleave', () => { if (_tipTimer) { clearTimeout(_tipTimer); _tipTimer = null; } tip.style.display = 'none'; });

/* ── Controls ─────────────────────────────────────────────────────────────── */
document.getElementById('ctrl-month').addEventListener('input', e => {
  document.getElementById('lbl-month').textContent = MONTH_NAMES[parseInt(e.target.value) - 1];
  draw();
});
document.getElementById('ctrl-alpha').value = VIZ_OPACITY;
document.getElementById('lbl-alpha').textContent = VIZ_OPACITY.toFixed(2);
document.getElementById('ctrl-alpha').addEventListener('input', e => {
  document.getElementById('lbl-alpha').textContent = parseFloat(e.target.value).toFixed(2); draw();
});

/* ── Load TL PNG ──────────────────────────────────────────────────────────── */
document.getElementById('loading').style.display = '';

loadTlPng(CONFIG.tlUrl, getAuthHeaders()).then(data => {
  TL_DATA = data;  // Uint8Array; decode: tl = value / 20; layout: (m*NLATS+r)*NLONS+c

  document.getElementById('loading').style.display = 'none';

  /* Stats across all cells */
  let minTL = 999, maxTL = 0, sumTL = 0;
  const N = TL_NLATS * TL_NLONS * TL_NMONTHS;
  for (let k = 0; k < N; k++) {
    const tl = TL_DATA[k] / 20;
    if (tl < minTL) minTL = tl;
    if (tl > maxTL) maxTL = tl;
    sumTL += tl;
  }

  document.getElementById('st-grid').textContent = `${TL_NLATS}×${TL_NLONS} @ ${TL_STEP}°`;
  document.getElementById('st-min').textContent  = minTL.toFixed(2);
  document.getElementById('st-max').textContent  = maxTL.toFixed(2);
  document.getElementById('st-mean').textContent = (sumTL / N).toFixed(2);

  draw();
}).catch(err => {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('st-grid').textContent = `${CONFIG.tlUrl} not ready`;
  console.warn('TL grid load failed:', err.message);
});

</script>
<script>/* refit Leaflet after the shared chrome lays out */
function _vizFit(){ try { map.invalidateSize(); } catch (e) {} }
addEventListener('load', _vizFit); setTimeout(_vizFit, 350);</script>
</body>
</html>
