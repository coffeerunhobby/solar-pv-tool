<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>T₂m Grid Visualisation - Solar PV Tool</title>
  <link rel="stylesheet" href="vendor/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css?v=1.2.7">
  <link rel="stylesheet" href="vendor/leaflet.css"/>
  <script>
    (function () {
      var m = document.cookie.match(/(?:^|;\s*)theme=(light|dark)/);
      var dark = m ? m[1] === 'dark' : matchMedia('(prefers-color-scheme:dark)').matches;
      document.documentElement.setAttribute('data-bs-theme', dark ? 'dark' : 'light');
    })();
  </script>
</head>
<body data-page="viz-temp">

<div class="site-shell">
  <div id="site-topbar"></div>
  <div class="site-body">
    <nav id="site-stepper"></nav>
    <div class="site-content">
      <div class="viz-bar">
  <h1>🌡 T₂m Grid - NASA POWER climatological monthly 2m air temperature</h1>
  <div class="sep"></div>
  <div id="stats">
    <span>Grid: <b id="st-grid">-</b></span>
    <span>Min T: <b id="st-min">-</b></span>
    <span>Max T: <b id="st-max">-</b></span>
    <span>Mean T: <b id="st-mean">-</b></span>
    <span>Visible: <b id="st-visible">-</b></span>
  </div>
</div>

<div id="map-wrap">
  <div id="map"></div>
  <canvas id="overlay"></canvas>

  <div id="controls">
    <h3>Display</h3>
    <div class="ctrl-row"><label>Month</label>
      <input type="range" id="ctrl-month" min="1" max="12" step="1" value="1">
      <span class="val" id="lbl-month">Jan</span></div>
    <div class="ctrl-row"><label>Opacity</label>
      <input type="range" id="ctrl-alpha" min="0.1" max="1" step="0.05">
      <span class="val" id="lbl-alpha"></span></div>
    <div id="loading" style="color:#fdd835;font-size:11px;margin-top:4px;display:none">Loading…</div>
  </div>

  <div id="legend">
    <h3>2m air temperature (°C) - cold to hot</h3>
    <div id="leg-ramp"></div>
  </div>
      </div>
    </div>
  </div>
</div>

<div id="tooltip"></div>

<!-- shared foundation -->
<script src="vendor/bootstrap.bundle.min.js"></script>
<script src="js/i18n_en.js?v=1.2.7"></script>
<script src="js/i18n_ro.js?v=1.2.7"></script>
<script src="js/i18n.js?v=1.2.7"></script>
<script src="js/theme.js?v=1.2.7"></script>
<script src="js/project-state.js?v=1.2.7"></script>
<script src="js/site-map.js?v=1.2.7"></script>
<script src="js/share.js?v=1.2.7"></script>
<script src="js/site-nav.js?v=1.2.7"></script>

<script src="vendor/leaflet.js"></script>
<script src="js/viz-basemap.js?v=1.2.7"></script>
<script src="js/config.js?v=1.2.7"></script>
<script src="js/grid-deshuffle.js?v=1.2.7"></script>
<script src="js/temp-png.js?v=1.2.7"></script>
<script>
let TEMP_DATA = null;

/* Grid constants come from config.js (TEMP_NLATS, TEMP_NLONS, TEMP_STEP, etc.) */
const HALF = TEMP_STEP / 2;

/* ── colour scale ── */
/* Smooth ramp: deep blue (extreme cold) -> cyan -> green -> yellow -> orange -> dark red. */
const TEMP_STOPS = [
  [-30, [ 13,  27, 110]],  // #0d1b6e extreme cold
  [-15, [ 21, 101, 192]],  // #1565C0 very cold
  [  0, [ 66, 165, 245]],  // #42a5f5 cold
  [ 10, [128, 203, 196]],  // #80cbc4 cool
  [ 20, [165, 214, 167]],  // #a5d6a7 mild
  [ 30, [253, 216,  53]],  // #fdd835 warm
  [ 40, [251, 140,   0]],  // #fb8c00 hot
  [ 45, [183,  28,  28]],  // #b71c1c extreme heat
];
const tempColor = vizRamp(TEMP_STOPS);
document.getElementById('leg-ramp').innerHTML = vizLegendBar(TEMP_STOPS,
  [{ v: -30, label: '&le;-30' }, { v: 0, label: '0' }, { v: 20, label: '20' }, { v: 45, label: '&ge;45' }]);

function fmtT(v) { return (v > 0 ? '+' : '') + v + '°C'; }

/* ── Map ── */
const map = L.map('map').setView([20, 10], 3);
vizBasemap(map);   /* theme-aware Carto basemap (js/viz-basemap.js) */

/* ── Canvas overlay ── */
const canvas = document.getElementById('overlay');
const ctx    = canvas.getContext('2d');

function resize() {
  const r = canvas.parentElement.getBoundingClientRect();
  canvas.width  = r.width;
  canvas.height = r.height;
}

/* Pre-render the selected month to an offscreen canvas ONCE (equirectangular, NLONS x NLATS,
   image row 0 = north). draw() then blits one strip per latitude row at its Mercator y, so
   per-frame cost is O(rows), not O(cells). Rebuilds only when the month changes. */
let gridCanvas = null, builtMonth = -1;
const _toRGB = s => s[0] === '#'
  ? [parseInt(s.slice(1, 3), 16), parseInt(s.slice(3, 5), 16), parseInt(s.slice(5, 7), 16)]
  : s.match(/\d+/g).map(Number);
/* colour LUT by PNG byte (px = degC+128) - built once, so a month rebuild is a pure copy */
const _gridLUT = (function () { const l = new Array(256); for (let p = 0; p < 256; p++) l[p] = _toRGB(tempColor(p - 128)); return l; })();
function buildGridCanvas(mo) {
  if (!TEMP_DATA) return;
  gridCanvas = gridCanvas || document.createElement('canvas');
  gridCanvas.width = TEMP_NLONS; gridCanvas.height = TEMP_NLATS;
  const g = gridCanvas.getContext('2d');
  const img = g.createImageData(TEMP_NLONS, TEMP_NLATS), d = img.data;
  for (let i = 0; i < TEMP_NLATS; i++) {
    const base = (TEMP_NLATS - 1 - i) * TEMP_NLONS;        // image row 0 = lat +90 (north)
    const grow = (mo * TEMP_NLATS + i) * TEMP_NLONS;
    for (let j = 0; j < TEMP_NLONS; j++) {
      const c = _gridLUT[TEMP_DATA[grow + j] + 128], o = (base + j) * 4;
      d[o] = c[0]; d[o + 1] = c[1]; d[o + 2] = c[2]; d[o + 3] = 255;
    }
  }
  g.putImageData(img, 0, 0);
  builtMonth = mo;
}

function draw() {
  if (!TEMP_DATA) return;
  const mo = parseInt(document.getElementById('ctrl-month').value) - 1;
  if (mo !== builtMonth) buildGridCanvas(mo);
  if (!gridCanvas) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.globalAlpha = parseFloat(document.getElementById('ctrl-alpha').value);
  ctx.imageSmoothingEnabled = false;

  const bnd  = map.getBounds();
  const iMin = Math.max(0,              Math.floor((bnd.getSouth() - TEMP_LAT_MIN) / TEMP_STEP) - 1);
  const iMax = Math.min(TEMP_NLATS - 1, Math.ceil ((bnd.getNorth() - TEMP_LAT_MIN) / TEMP_STEP) + 1);
  if (iMax < iMin) { document.getElementById('st-visible').textContent = '0'; return; }

  const leftLon  = TEMP_LON_MIN - HALF;                                  // cell 0 left edge
  const rightLon = TEMP_LON_MIN + (TEMP_NLONS - 1) * TEMP_STEP + HALF;   // last cell right edge
  let visible = 0;
  for (const wo of [-360, 0, 360]) {                                     // canonical + world-wrap copies
    const xL = map.latLngToContainerPoint([0, leftLon  + wo]).x;
    const xR = map.latLngToContainerPoint([0, rightLon + wo]).x;
    if (xR < 0 || xL > canvas.width) continue;
    const dw = xR - xL;
    for (let i = iMin; i <= iMax; i++) {
      const yT = map.latLngToContainerPoint([Math.min(TEMP_LAT_MIN + i * TEMP_STEP + HALF,  90), leftLon + wo]).y;
      const yB = map.latLngToContainerPoint([Math.max(TEMP_LAT_MIN + i * TEMP_STEP - HALF, -90), leftLon + wo]).y;
      if (yB <= yT) continue;
      ctx.drawImage(gridCanvas, 0, TEMP_NLATS - 1 - i, TEMP_NLONS, 1, xL, yT, dw, yB - yT);
      visible += TEMP_NLONS;
    }
  }
  document.getElementById('st-visible').textContent = '~' + visible.toLocaleString();
}

/* ── Map / window events ── */
map.on('move zoom moveend zoomend', draw);
window.addEventListener('resize', () => { resize(); draw(); });
resize();

/* ── Tooltip ── */
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const tip = document.getElementById('tooltip');

/* debounce: compute + show the readout only when the mouse STOPS (was rebuilding the tooltip on
   every mousemove - heavy: lat/lon math + 12-month array + innerHTML). */
let _tipTimer = null, _tipEv = null;
function _renderTip() {
  const e = _tipEv; if (!e) return;
  if (!TEMP_DATA) { tip.style.display = 'none'; return; }
  const rect = canvas.getBoundingClientRect();
  const cpt  = map.containerPointToLatLng([e.clientX - rect.left, e.clientY - rect.top]);
  const lat  = cpt.lat, lon = cpt.lng;

  const iLat = Math.round((lat - TEMP_LAT_MIN) / TEMP_STEP);
  const iLon = Math.round((lon - TEMP_LON_MIN) / TEMP_STEP);
  if (iLat < 0 || iLat >= TEMP_NLATS || iLon < 0 || iLon >= TEMP_NLONS) {
    tip.style.display = 'none'; return;
  }

  const fnum = x => (+x).toFixed(2).replace(/\.?0+$/, '');   // 2 dp, strip trailing zeros
  const gLat = TEMP_LAT_MIN + iLat * TEMP_STEP;
  const gLon = TEMP_LON_MIN + iLon * TEMP_STEP;
  const mo   = parseInt(document.getElementById('ctrl-month').value) - 1;

  /* PNG layout: (m * NLATS + r) * NLONS + c */
  const monthly = Array.from({length: 12}, (_, m) => TEMP_DATA[(m * TEMP_NLATS + iLat) * TEMP_NLONS + iLon]);
  const cur = monthly[mo];

  const ann = Math.round(monthly.reduce((a, b) => a + b, 0) / 12);
  tip.innerHTML =
    `<b style="color:${tempColor(cur)}">${fmtT(cur)}</b> - ${MONTH_NAMES[mo]}<br>` +
    `Annual mean: <b>${fmtT(ann)}</b><br>` +
    `Grid node: ${gLat >= 0 ? fnum(gLat)+'°N' : fnum(-gLat)+'°S'}, ${gLon >= 0 ? fnum(gLon)+'°E' : fnum(-gLon)+'°W'}<br>` +
    `<span style="color:#8a90a0;font-size:10px">` +
    monthly.map((v, m) =>
      `<span style="color:${m === mo ? '#fff' : '#555'}">${MONTH_NAMES[m]}: <span style="color:${m === mo ? tempColor(v) : '#666'}">${fmtT(v)}</span></span>`
    ).join(' · ') +
    `</span><br>` +
    `<span style="color:#444;font-size:10px">Cursor: ${fnum(lat)}°, ${fnum(lon)}°</span>`;

  tip.style.display = 'block';
  /* Flip horizontally when too close to right edge */
  const tipW = tip.offsetWidth || 260;
  const left = (e.clientX + 14 + tipW > window.innerWidth)
             ? (e.clientX - tipW - 10) : (e.clientX + 14);
  tip.style.left = left + 'px';
  tip.style.top  = (e.clientY - 10) + 'px';
}
const _mapWrap = document.getElementById('map-wrap');
_mapWrap.addEventListener('mousemove', e => {
  _tipEv = { clientX: e.clientX, clientY: e.clientY };
  if (tip.style.display !== 'none') tip.style.display = 'none';   // drop the stale tip while moving
  if (_tipTimer) clearTimeout(_tipTimer);
  _tipTimer = setTimeout(_renderTip, 90);
});
_mapWrap.addEventListener('mouseleave', () => { if (_tipTimer) { clearTimeout(_tipTimer); _tipTimer = null; } tip.style.display = 'none'; });

/* ── Controls ── */
document.getElementById('ctrl-month').addEventListener('input', e => {
  document.getElementById('lbl-month').textContent = MONTH_NAMES[parseInt(e.target.value) - 1];
  draw();
});
document.getElementById('ctrl-alpha').value = VIZ_OPACITY;
document.getElementById('lbl-alpha').textContent = VIZ_OPACITY.toFixed(2);
document.getElementById('ctrl-alpha').addEventListener('input', e => {
  document.getElementById('lbl-alpha').textContent = parseFloat(e.target.value).toFixed(2); draw();
});

/* ── Load temperature PNG ── */
document.getElementById('loading').style.display = '';
loadTemperaturePng(CONFIG.tempUrl).then(data => {
  document.getElementById('loading').style.display = 'none';
  TEMP_DATA = data;   // Int8Array, layout: (m * NLATS + r) * NLONS + c

  /* Stats across all nodes and months */
  let minT = 127, maxT = -128, sumT = 0, count = 0;
  const nCells = TEMP_NLATS * TEMP_NLONS * TEMP_NMONTHS;
  for (let k = 0; k < nCells; k++) {
    const v = TEMP_DATA[k];
    if (v < minT) minT = v;
    if (v > maxT) maxT = v;
    sumT += v;
    count++;
  }

  document.getElementById('st-grid').textContent  = `${TEMP_NLATS}×${TEMP_NLONS} @ ${TEMP_STEP}°`;
  document.getElementById('st-min').textContent   = fmtT(minT);
  document.getElementById('st-max').textContent   = fmtT(maxT);
  document.getElementById('st-mean').textContent  = count ? fmtT(Math.round(sumT / count)) : '-';

  draw();
}).catch(err => {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('st-grid').textContent = 'Error: ' + err.message;
  console.error('Failed to load temperature PNG:', err);
});
</script>
<script>/* refit Leaflet after the shared chrome lays out */
function _vizFit(){ try { map.invalidateSize(); } catch (e) {} }
addEventListener('load', _vizFit); setTimeout(_vizFit, 350);</script>
</body>
</html>
