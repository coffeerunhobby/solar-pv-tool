<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Elevation Grid Visualisation - Solar PV Tool</title>
  <link rel="stylesheet" href="vendor/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css?v=1.2.11">
  <link rel="stylesheet" href="vendor/leaflet.css"/>
  <script>
    (function () {
      var m = document.cookie.match(/(?:^|;\s*)theme=(light|dark)/);
      var dark = m ? m[1] === 'dark' : matchMedia('(prefers-color-scheme:dark)').matches;
      document.documentElement.setAttribute('data-bs-theme', dark ? 'dark' : 'light');
    })();
  </script>
</head>
<body data-page="viz-elev">

<div class="site-shell">
  <div id="site-topbar"></div>
  <div class="site-body">
    <nav id="site-stepper"></nav>
    <div class="site-content">
      <div class="viz-bar">
        <h1>⛰ Elevation Grid - ETOPO2022</h1>
        <div class="sep"></div>
        <div id="stats">
          <span>Grid: <b id="st-grid">-</b></span>
          <span>Max: <b id="st-max">-</b></span>
          <span>Mean (land): <b id="st-mean">-</b></span>
          <span>Land cells: <b id="st-land">-</b></span>
          <span>Visible: <b id="st-visible">-</b></span>
        </div>
      </div>

<div id="map-wrap">
  <div id="map"></div>
  <canvas id="overlay"></canvas>

  <div id="controls">
    <h3>Display</h3>
    <div class="ctrl-row"><label>Opacity</label>
      <input type="range" id="ctrl-alpha" min="0.1" max="1" step="0.05">
      <span class="val" id="lbl-alpha"></span></div>
    <div id="loading">Loading PNG…</div>
  </div>

  <div id="legend">
    <h3>Elevation (m asl)</h3>
    <div class="leg-row" style="margin-bottom:7px"><div style="width:12px;height:12px;border-radius:2px;background:#1565C0;flex-shrink:0"></div><span>0 m - ocean / sea level</span></div>
    <div id="leg-ramp"></div>
  </div>
</div>

      </div><!-- /#map-wrap -->
    </div><!-- /.site-content -->
  </div><!-- /.site-body -->
</div><!-- /.site-shell -->

<div id="tooltip"></div>

<!-- shared foundation -->
<script src="vendor/bootstrap.bundle.min.js"></script>
<script src="js/i18n_en.js?v=1.2.11"></script>
<script src="js/i18n_ro.js?v=1.2.11"></script>
<script src="js/i18n.js?v=1.2.11"></script>
<script src="js/theme.js?v=1.2.11"></script>
<script src="js/project-state.js?v=1.2.11"></script>
<script src="js/site-map.js?v=1.2.11"></script>
<script src="js/share.js?v=1.2.11"></script>
<script src="js/site-nav.js?v=1.2.11"></script>

<script src="vendor/leaflet.js"></script>
<script src="js/viz-basemap.js?v=1.2.11"></script>
<script src="js/config.js?v=1.2.11"></script>
<script src="js/grid-deshuffle.js?v=1.2.11"></script>
<script src="js/elevation-png.js?v=1.2.11"></script>
<script>

/* ── Single 0.1° ETOPO2022 grid (geometry from config.js ELEV_*) ── */
let profile = { url: CONFIG.elevationUrl, nlats: ELEV_NLATS, nlons: ELEV_NLONS, step: ELEV_STEP, label: `${ELEV_STEP}°×${ELEV_STEP}° - active (config.js)` };

let ELEV_DATA = null;

/* ── Colour scale (hypsometric tint) ── */
/* Smooth hypsometric tint: green lowlands -> yellow -> orange -> brown -> white peaks.
   Ocean (0 m) stays a distinct blue (categorical, not part of the land ramp). */
const ELEV_STOPS = [
  [   0, [102, 187, 106]],  // #66bb6a lowlands
  [ 200, [212, 225,  87]],  // #d4e157 plains
  [ 500, [253, 216,  53]],  // #fdd835 uplands
  [1000, [251, 140,   0]],  // #fb8c00 highlands
  [2000, [141, 110,  99]],  // #8d6e63 mountains
  [3500, [224, 224, 224]],  // #e0e0e0 high peaks
];
const _elevRamp = vizRamp(ELEV_STOPS);
function elevColor(m) {
  if (m <= 0) return '#1565C0';     // ocean / sea level (clamped to 0)
  return _elevRamp(m);
}
/* Colour lookup table keyed by PNG pixel value (px = round(m / ELEV_SCALE), 0-255) so the ramp
   interpolation runs 256 times, never per cell. _elevLUT[px] = [r,g,b] (px 0 = ocean blue). */
const _elevLUT = (function () {
  const toRGB = s => s[0] === '#'
    ? [parseInt(s.slice(1, 3), 16), parseInt(s.slice(3, 5), 16), parseInt(s.slice(5, 7), 16)]
    : s.match(/\d+/g).map(Number);            // 'rgb(r,g,b)' from vizRamp
  const lut = new Array(256);
  for (let px = 0; px < 256; px++) lut[px] = toRGB(elevColor(px * ELEV_SCALE));  // px 0 -> ocean, else land
  return lut;
})();
document.getElementById('leg-ramp').innerHTML = vizLegendBar(ELEV_STOPS,
  [{ v: 0, label: '0' }, { v: 500, label: '500' }, { v: 1000, label: '1000' },
   { v: 2000, label: '2000' }, { v: 3500, label: '&ge;3500' }]);

/* ── Map ── */
const map = L.map('map').setView([20, 10], 3);
vizBasemap(map);   /* theme-aware Carto basemap (js/viz-basemap.js) */

/* ── Canvas overlay ── */
const canvas = document.getElementById('overlay');
const ctx    = canvas.getContext('2d');

function resize() {
  const r = canvas.parentElement.getBoundingClientRect();
  canvas.width  = r.width;
  canvas.height = r.height;
}

/* Pre-render the whole grid to an offscreen canvas ONCE (equirectangular, NLONS x NLATS, image
   row 0 = north). Then draw() just blits it - per-frame cost is O(rows), not O(cells). */
let gridCanvas = null;
function buildGridCanvas() {
  if (!ELEV_DATA) return;
  const { nlats: NLATS, nlons: NLONS } = profile;
  gridCanvas = document.createElement('canvas');
  gridCanvas.width = NLONS; gridCanvas.height = NLATS;
  const g = gridCanvas.getContext('2d');
  const img = g.createImageData(NLONS, NLATS), d = img.data;
  for (let i = 0; i < NLATS; i++) {
    const base = (NLATS - 1 - i) * NLONS;        // flip: image row 0 = lat +90 (north); data row 0 = south
    const grow = i * NLONS;
    for (let j = 0; j < NLONS; j++) {
      const px = Math.min(255, Math.max(0, Math.round(ELEV_DATA[grow + j] / ELEV_SCALE)));
      const c  = _elevLUT[px], o = (base + j) * 4;
      d[o] = c[0]; d[o + 1] = c[1]; d[o + 2] = c[2]; d[o + 3] = 255;
    }
  }
  g.putImageData(img, 0, 0);
}

function draw() {
  if (!gridCanvas) return;
  const { nlats: NLATS, nlons: NLONS, step: STEP } = profile;
  const HALF = STEP / 2;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.globalAlpha = parseFloat(document.getElementById('ctrl-alpha').value);
  ctx.imageSmoothingEnabled = false;

  const bnd  = map.getBounds();
  const iMin = Math.max(0,       Math.floor((bnd.getSouth() + 90)  / STEP) - 1);
  const iMax = Math.min(NLATS-1, Math.ceil ((bnd.getNorth() + 90)  / STEP) + 1);
  const jMin = Math.max(0,       Math.floor((bnd.getWest()  + 180) / STEP) - 1);
  const jMax = Math.min(NLONS-1, Math.ceil ((bnd.getEast()  + 180) / STEP) + 1);
  document.getElementById('loading').style.display = 'none';
  if (iMax < iMin || jMax < jMin) return;

  /* longitude is linear in pixels: map src columns [jMin..jMax] to dest [xL..xR] once */
  const lonL = -180 + jMin * STEP - HALF, lonR = -180 + jMax * STEP + HALF;
  const xL = map.latLngToContainerPoint([0, lonL]).x;
  const xR = map.latLngToContainerPoint([0, lonR]).x;
  const dw = xR - xL, sx = jMin, sw = jMax - jMin + 1;
  /* one strip per latitude row, placed at its Mercator y (handles lat distortion) */
  for (let i = iMin; i <= iMax; i++) {
    const yT = map.latLngToContainerPoint([-90 + i * STEP + HALF, lonL]).y;
    const yB = map.latLngToContainerPoint([-90 + i * STEP - HALF, lonL]).y;
    if (yB <= yT) continue;
    ctx.drawImage(gridCanvas, sx, NLATS - 1 - i, sw, 1, xL, yT, dw, yB - yT);
  }
  document.getElementById('st-visible').textContent = '~' + ((iMax - iMin + 1) * sw).toLocaleString();
}

/* ── Load elevation PNG ── */
function loadElevation() {
  ELEV_DATA = null;
  gridCanvas = null;
  document.getElementById('st-max').textContent  = '-';
  document.getElementById('st-mean').textContent = '-';
  document.getElementById('st-land').textContent = '-';
  document.getElementById('loading').style.display = '';
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  loadElevationPng(profile.url).then(data => {
    ELEV_DATA = data;

    /* Stats */
    let maxM = 0, sumM = 0, land = 0;
    for (let k = 0; k < ELEV_DATA.length; k++) {
      const v = ELEV_DATA[k];
      if (v > maxM) maxM = v;
      if (v > 0) { land++; sumM += v; }
    }
    document.getElementById('st-max').textContent  = maxM.toLocaleString() + ' m';
    document.getElementById('st-mean').textContent = land ? Math.round(sumM / land).toLocaleString() + ' m' : '-';
    document.getElementById('st-land').textContent = land.toLocaleString();
    document.getElementById('st-grid').textContent = `${profile.nlats}×${profile.nlons} @ ${profile.step}°`;
    document.getElementById('loading').style.display = 'none';

    buildGridCanvas();
    draw();
  }).catch(err => {
    console.error('Failed to load elevation PNG:', err);
    document.getElementById('st-grid').textContent = 'Error: ' + err.message;
    document.getElementById('loading').style.display = 'none';
  });
}

/* ── Map / window events ── */
map.on('move zoom moveend zoomend', draw);
window.addEventListener('resize', () => { resize(); draw(); });
resize();

/* ── Tooltip ── */
const tip = document.getElementById('tooltip');

/* debounce: compute + show the readout only when the mouse STOPS (was rebuilding the tooltip on
   every mousemove - heavy: lat/lon math + innerHTML). */
let _tipTimer = null, _tipEv = null;
function _renderTip() {
  const e = _tipEv; if (!e) return;
  if (!ELEV_DATA) { tip.style.display = 'none'; return; }
  const { nlats: NLATS, nlons: NLONS, step: STEP } = profile;
  const HALF = STEP / 2;

  const rect = canvas.getBoundingClientRect();
  const cpt  = map.containerPointToLatLng([e.clientX - rect.left, e.clientY - rect.top]);
  const lat  = cpt.lat, lon = cpt.lng;

  const iLat = Math.round((lat + 90)  / STEP);
  const iLon = Math.round((lon + 180) / STEP);
  if (iLat < 0 || iLat >= NLATS || iLon < 0 || iLon >= NLONS) {
    tip.style.display = 'none'; return;
  }

  const fnum = x => (+x).toFixed(2).replace(/\.?0+$/, '');   // 2 dp, strip trailing zeros
  const gLat = -90  + iLat * STEP;
  const gLon = -180 + iLon * STEP;
  const m    = ELEV_DATA[iLat * NLONS + iLon];

  const label = m === 0 ? '0 m (ocean / sea level)'
              :           `${m.toLocaleString()} m asl`;
  const color = elevColor(m);

  tip.innerHTML =
    `<b style="color:${color}">${label}</b><br>` +
    `Grid node: ${gLat >= 0 ? fnum(gLat) + '°N' : fnum(-gLat) + '°S'}, ` +
               `${gLon >= 0 ? fnum(gLon) + '°E' : fnum(-gLon) + '°W'} ` +
               `(±${fnum(HALF)}°)<br>` +
    `<span style="color:#555;font-size:10px">Cursor: ${fnum(lat)}°, ${fnum(lon)}°</span>`;

  tip.style.display = 'block';
  const tipW = tip.offsetWidth || 200;
  const left = (e.clientX + 14 + tipW > window.innerWidth)
             ? (e.clientX - tipW - 10) : (e.clientX + 14);
  tip.style.left = left + 'px';
  tip.style.top  = (e.clientY - 10) + 'px';
}
const _mapWrap = document.getElementById('map-wrap');
_mapWrap.addEventListener('mousemove', e => {
  _tipEv = { clientX: e.clientX, clientY: e.clientY };
  if (tip.style.display !== 'none') tip.style.display = 'none';   // drop the stale tip while moving
  if (_tipTimer) clearTimeout(_tipTimer);
  _tipTimer = setTimeout(_renderTip, 90);
});
_mapWrap.addEventListener('mouseleave', () => { if (_tipTimer) { clearTimeout(_tipTimer); _tipTimer = null; } tip.style.display = 'none'; });

/* ── Control events ── */
document.getElementById('ctrl-alpha').value = VIZ_OPACITY;
document.getElementById('lbl-alpha').textContent = VIZ_OPACITY.toFixed(2);
document.getElementById('ctrl-alpha').addEventListener('input', e => {
  document.getElementById('lbl-alpha').textContent = parseFloat(e.target.value).toFixed(2); draw();
});
/* ── Initial load ── */
loadElevation();
</script>
<script>/* refit Leaflet after the shared chrome lays out */
function _vizFit(){ try { map.invalidateSize(); } catch (e) {} }
addEventListener('load', _vizFit); setTimeout(_vizFit, 350);</script>
</body>
</html>
