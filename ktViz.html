<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Kt Grid Visualisation - Solar PV Tool</title>
  <link rel="stylesheet" href="vendor/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css?v=1.2.7">
  <link rel="stylesheet" href="vendor/leaflet.css"/>
  <script>
    (function () {
      var m = document.cookie.match(/(?:^|;\s*)theme=(light|dark)/);
      var dark = m ? m[1] === 'dark' : matchMedia('(prefers-color-scheme:dark)').matches;
      document.documentElement.setAttribute('data-bs-theme', dark ? 'dark' : 'light');
    })();
  </script>
</head>
<body data-page="viz-kt">

<div class="site-shell">
  <div id="site-topbar"></div>
  <div class="site-body">
    <nav id="site-stepper"></nav>
    <div class="site-content">
      <div class="viz-bar">
  <h1>☀ Kt Grid - CM SAF CLARA-A3 0.25° global base + SARAH-3 0.05° Europe tile (clearness index Kt_cs)</h1>
  <div class="sep"></div>
  <div id="stats">
    <span>Grid: <b id="st-grid">-</b></span>
    <span>Max Kt: <b id="st-max">-</b></span>
    <span>Mean Kt: <b id="st-mean">-</b></span>
    <span>Visible: <b id="st-visible">-</b></span>
  </div>
</div>

<div id="map-wrap">
  <div id="map"></div>
  <canvas id="overlay"></canvas>

  <div id="controls">
    <h3>Display</h3>
    <div class="ctrl-row"><label>Month</label>
      <input type="range" id="ctrl-month" min="1" max="12" step="1" value="7">
      <span class="val" id="lbl-month">Jul</span></div>
    <div class="ctrl-row"><label>Opacity</label>
      <input type="range" id="ctrl-alpha" min="0.1" max="1" step="0.05">
      <span class="val" id="lbl-alpha"></span></div>
    <div class="ctrl-row" id="tile-ctrl" style="display:none"><label>Hi-res 0.05°</label>
      <input type="checkbox" id="ctrl-tiles" checked style="width:auto;flex:0 0 auto;margin-right:6px">
      <span class="val" id="lbl-tiles" style="font-size:11px;color:#4caf50"></span></div>
    <div id="loading" style="color:#fdd835;font-size:11px;margin-top:4px;display:none">Loading…</div>
  </div>

  <div id="legend">
    <h3>Clearness index Kt_cs - cloudy to desert-clear</h3>
    <div id="leg-ramp"></div>
  </div>
      </div>
    </div>
  </div>
</div>

<div id="tooltip"></div>

<!-- shared foundation -->
<script src="vendor/bootstrap.bundle.min.js"></script>
<script src="js/i18n_en.js?v=1.2.7"></script>
<script src="js/i18n_ro.js?v=1.2.7"></script>
<script src="js/i18n.js?v=1.2.7"></script>
<script src="js/theme.js?v=1.2.7"></script>
<script src="js/project-state.js?v=1.2.7"></script>
<script src="js/site-map.js?v=1.2.7"></script>
<script src="js/share.js?v=1.2.7"></script>
<script src="js/site-nav.js?v=1.2.7"></script>

<script src="vendor/leaflet.js"></script>
<script src="js/viz-basemap.js?v=1.2.7"></script>
<script src="js/config.js?v=1.2.7"></script>
<script src="js/grid-deshuffle.js?v=1.2.7"></script>
<script src="js/kt-png.js?v=1.2.7"></script>
<script>
let KT_DATA = null;

/* Grid constants come from config.js (KT_NLATS, KT_NLONS, KT_STEP, KT_NMONTHS, KT_LAT_MIN, KT_LON_MIN) */
const HALF = KT_STEP / 2;

/* ── colour scale ── */
/* Smooth ramp: grey (very cloudy) -> blue -> green -> yellow -> orange -> red (desert). */
const KT_STOPS = [
  [0.20, [ 84, 110, 122]],  // #546e7a very cloudy / polar night
  [0.35, [ 92, 107, 192]],  // #5c6bc0 cloudy
  [0.50, [102, 187, 106]],  // #66bb6a moderate
  [0.60, [253, 216,  53]],  // #fdd835 good
  [0.70, [251, 140,   0]],  // #fb8c00 very good
  [0.80, [229,  57,  53]],  // #e53935 excellent (desert)
];
const ktColor = vizRamp(KT_STOPS);
document.getElementById('leg-ramp').innerHTML = vizLegendBar(KT_STOPS,
  [{ v: 0.20, label: '&le;0.2' }, { v: 0.35, label: '0.35' }, { v: 0.5, label: '0.5' },
   { v: 0.65, label: '0.65' }, { v: 0.80, label: '&ge;0.8' }]);

/* ── Map ── */
const map = L.map('map').setView([20, 10], 3);
vizBasemap(map);   /* theme-aware Carto basemap (js/viz-basemap.js) */

/* ── Canvas overlay ── */
const canvas = document.getElementById('overlay');
const ctx    = canvas.getContext('2d');

function resize() {
  const r = canvas.parentElement.getBoundingClientRect();
  canvas.width  = r.width;
  canvas.height = r.height;
}

/* Pre-render the selected month to an offscreen canvas ONCE (equirectangular, NLONS x NLATS,
   image row 0 = north). draw() then blits one strip per latitude row at its Mercator y, so
   per-frame cost is O(rows), not O(cells). Rebuilds only when the month changes. */
let gridCanvas = null, builtMonth = -1;
const _toRGB = s => s[0] === '#'
  ? [parseInt(s.slice(1, 3), 16), parseInt(s.slice(3, 5), 16), parseInt(s.slice(5, 7), 16)]
  : s.match(/\d+/g).map(Number);
/* colour LUT by raw PNG byte (px = round(kt*100)) - built once, so a month rebuild is a pure copy */
const _gridLUT = (function () { const l = new Array(256); for (let p = 0; p < 256; p++) l[p] = _toRGB(ktColor(p / 100)); return l; })();
function buildGridCanvas(mo) {
  if (!KT_DATA) return;
  gridCanvas = gridCanvas || document.createElement('canvas');
  gridCanvas.width = KT_NLONS; gridCanvas.height = KT_NLATS;
  const g = gridCanvas.getContext('2d');
  const img = g.createImageData(KT_NLONS, KT_NLATS), d = img.data;
  for (let i = 0; i < KT_NLATS; i++) {
    const base = (KT_NLATS - 1 - i) * KT_NLONS;            // image row 0 = lat +90 (north)
    const grow = (mo * KT_NLATS + i) * KT_NLONS;
    for (let j = 0; j < KT_NLONS; j++) {
      const c = _gridLUT[KT_DATA[grow + j]], o = (base + j) * 4;
      d[o] = c[0]; d[o + 1] = c[1]; d[o + 2] = c[2]; d[o + 3] = 255;
    }
  }
  g.putImageData(img, 0, 0);
  builtMonth = mo;
}

/* ── Hi-res tile layers (CONFIG.KT_TILES — the single SARAH-3 0.05° Europe tile) ──
   Same encoding + colour LUT as the base; rendered ON TOP, with the base cleared underneath so
   the fine cells fully replace the coarse 1° ones at the same opacity. Generic over KT_TILES. */
const KT_TILE_LAYERS = [];
let curMo = 6;
function tilesOn() { const c = document.getElementById('ctrl-tiles'); return KT_TILE_LAYERS.length && c && c.checked; }
function buildLayerCanvas(layer, mo) {
  const { data, meta } = layer, NL = meta.nlats, NO = meta.nlons;
  layer.canvas = layer.canvas || document.createElement('canvas');
  layer.canvas.width = NO; layer.canvas.height = NL;
  const g = layer.canvas.getContext('2d'), img = g.createImageData(NO, NL), d = img.data;
  for (let i = 0; i < NL; i++) {
    const base = (NL - 1 - i) * NO, grow = (mo * NL + i) * NO;          // image row 0 = north
    for (let j = 0; j < NO; j++) { const cc = _gridLUT[data[grow + j]], o = (base + j) * 4; d[o]=cc[0]; d[o+1]=cc[1]; d[o+2]=cc[2]; d[o+3]=255; }
  }
  g.putImageData(img, 0, 0); layer.builtMonth = mo;
}
function blitLayer(layer) {
  const m = layer.meta, NL = m.nlats, NO = m.nlons, st = m.step, half = st / 2;
  if (layer.builtMonth !== curMo) buildLayerCanvas(layer, curMo);
  const latS = m.latMin, latN = m.latMin + (NL - 1) * st, lonW = m.lonMin, lonE = m.lonMin + (NO - 1) * st;
  for (const wo of [-360, 0, 360]) {
    const xL = map.latLngToContainerPoint([0, lonW - half + wo]).x;
    const xR = map.latLngToContainerPoint([0, lonE + half + wo]).x;
    if (xR < 0 || xL > canvas.width) continue;
    const dw = xR - xL;
    const yTop = map.latLngToContainerPoint([Math.min(latN + half, 90), lonW + wo]).y;
    const yBot = map.latLngToContainerPoint([Math.max(latS - half, -90), lonW + wo]).y;
    ctx.clearRect(xL, yTop, dw, yBot - yTop);                           // drop base so the tile doesn't blend over it
    for (let i = 0; i < NL; i++) {
      const yT = map.latLngToContainerPoint([Math.min(latS + i * st + half, 90), lonW + wo]).y;
      const yB = map.latLngToContainerPoint([Math.max(latS + i * st - half, -90), lonW + wo]).y;
      if (yB <= yT) continue;
      ctx.drawImage(layer.canvas, 0, NL - 1 - i, NO, 1, xL, yT, dw, yB - yT);
    }
    const sa = ctx.globalAlpha; ctx.globalAlpha = 1;                    // dashed boundary so the hi-res region is obvious
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.setLineDash([5, 3]);
    ctx.strokeRect(xL, yTop, dw, yBot - yTop); ctx.setLineDash([]); ctx.globalAlpha = sa;
  }
}

function draw() {
  if (!KT_DATA) return;
  const mo = parseInt(document.getElementById('ctrl-month').value) - 1;
  curMo = mo;
  if (mo !== builtMonth) buildGridCanvas(mo);
  if (!gridCanvas) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.globalAlpha = parseFloat(document.getElementById('ctrl-alpha').value);
  ctx.imageSmoothingEnabled = false;

  const bnd  = map.getBounds();
  const iMin = Math.max(0,            Math.floor((bnd.getSouth() - KT_LAT_MIN) / KT_STEP) - 1);
  const iMax = Math.min(KT_NLATS - 1, Math.ceil ((bnd.getNorth() - KT_LAT_MIN) / KT_STEP) + 1);
  let visible = 0;
  if (iMax >= iMin) {
    const leftLon  = KT_LON_MIN - HALF;                                  // cell 0 left edge
    const rightLon = KT_LON_MIN + (KT_NLONS - 1) * KT_STEP + HALF;       // last cell right edge
    for (const wo of [-360, 0, 360]) {                                   // canonical + world-wrap copies
      const xL = map.latLngToContainerPoint([0, leftLon  + wo]).x;
      const xR = map.latLngToContainerPoint([0, rightLon + wo]).x;
      if (xR < 0 || xL > canvas.width) continue;
      const dw = xR - xL;
      for (let i = iMin; i <= iMax; i++) {
        const yT = map.latLngToContainerPoint([Math.min(KT_LAT_MIN + i * KT_STEP + HALF,  90), leftLon + wo]).y;
        const yB = map.latLngToContainerPoint([Math.max(KT_LAT_MIN + i * KT_STEP - HALF, -90), leftLon + wo]).y;
        if (yB <= yT) continue;
        ctx.drawImage(gridCanvas, 0, KT_NLATS - 1 - i, KT_NLONS, 1, xL, yT, dw, yB - yT);
        visible += KT_NLONS;
      }
    }
  }
  document.getElementById('st-visible').textContent = '~' + visible.toLocaleString();

  if (tilesOn()) KT_TILE_LAYERS.forEach(blitLayer);                      // hi-res tiles on top
}

/* ── Map / window events ── */
map.on('move zoom moveend zoomend', draw);
window.addEventListener('resize', () => { resize(); draw(); });
resize();

/* ── Tooltip ── */
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const tip = document.getElementById('tooltip');

/* debounce: compute + show the readout only when the mouse STOPS (was rebuilding the tooltip on
   every mousemove - heavy: lat/lon math + 12-month array + innerHTML). */
let _tipTimer = null, _tipEv = null;
function _renderTip() {
  const e = _tipEv; if (!e) return;
  if (!KT_DATA) { tip.style.display = 'none'; return; }
  const rect = canvas.getBoundingClientRect();
  const cpt  = map.containerPointToLatLng([e.clientX - rect.left, e.clientY - rect.top]);
  const lat  = cpt.lat, lon = cpt.lng;

  const fnum = x => (+x).toFixed(2).replace(/\.?0+$/, '');   // 2 dp, strip trailing zeros
  const mo   = parseInt(document.getElementById('ctrl-month').value) - 1;

  /* prefer a hi-res tile under the cursor, else the 0.25° base */
  let src = { data: KT_DATA, NL: KT_NLATS, NO: KT_NLONS, latMin: KT_LAT_MIN, lonMin: KT_LON_MIN, step: KT_STEP, label: null };
  if (tilesOn()) for (const L of KT_TILE_LAYERS) {
    const m = L.meta, latN = m.latMin + (m.nlats - 1) * m.step, lonE = m.lonMin + (m.nlons - 1) * m.step, h = m.step / 2;
    if (lat >= m.latMin - h && lat <= latN + h && lon >= m.lonMin - h && lon <= lonE + h) {
      src = { data: L.data, NL: m.nlats, NO: m.nlons, latMin: m.latMin, lonMin: m.lonMin, step: m.step, label: m.iso + ' ' + m.step + '°' }; break;
    }
  }
  const iLat = Math.round((lat - src.latMin) / src.step);
  const iLon = Math.round((lon - src.lonMin) / src.step);
  if (iLat < 0 || iLat >= src.NL || iLon < 0 || iLon >= src.NO) { tip.style.display = 'none'; return; }
  const gLat = src.latMin + iLat * src.step;
  const gLon = src.lonMin + iLon * src.step;

  const monthly = Array.from({length: 12}, (_, m) => src.data[(m * src.NL + iLat) * src.NO + iLon] / 100);
  const cur = monthly[mo];
  const ann = fnum(monthly.reduce((a, b) => a + b, 0) / 12);

  tip.innerHTML =
    `<b style="color:${ktColor(cur)}">Kt ${fnum(cur)}</b> - ${MONTH_NAMES[mo]}` +
    (src.label ? ` <span style="color:#4caf50;font-size:10px">&#9679; ${src.label}</span>` : '') + `<br>` +
    `Annual mean: <b>${ann}</b><br>` +
    `Grid node: ${gLat >= 0 ? fnum(gLat)+'°N' : fnum(-gLat)+'°S'}, ${gLon >= 0 ? fnum(gLon)+'°E' : fnum(-gLon)+'°W'}<br>` +
    `<span style="color:#8a90a0;font-size:10px">` +
    monthly.map((v, m) =>
      `<span style="color:${m === mo ? '#fff' : '#555'}">${MONTH_NAMES[m]}: <span style="color:${m === mo ? ktColor(v) : '#666'}">${fnum(v)}</span></span>`
    ).join(' · ') +
    `</span><br>` +
    `<span style="color:#444;font-size:10px">Cursor: ${fnum(lat)}°, ${fnum(lon)}°</span>`;

  tip.style.display = 'block';
  const tipW = tip.offsetWidth || 260;
  const left = (e.clientX + 14 + tipW > window.innerWidth)
             ? (e.clientX - tipW - 10) : (e.clientX + 14);
  tip.style.left = left + 'px';
  tip.style.top  = (e.clientY - 10) + 'px';
}
const _mapWrap = document.getElementById('map-wrap');
_mapWrap.addEventListener('mousemove', e => {
  _tipEv = { clientX: e.clientX, clientY: e.clientY };
  if (tip.style.display !== 'none') tip.style.display = 'none';   // drop the stale tip while moving
  if (_tipTimer) clearTimeout(_tipTimer);
  _tipTimer = setTimeout(_renderTip, 90);
});
_mapWrap.addEventListener('mouseleave', () => { if (_tipTimer) { clearTimeout(_tipTimer); _tipTimer = null; } tip.style.display = 'none'; });

/* ── Controls ── */
document.getElementById('ctrl-month').addEventListener('input', e => {
  document.getElementById('lbl-month').textContent = MONTH_NAMES[parseInt(e.target.value) - 1];
  draw();
});
document.getElementById('ctrl-alpha').value = VIZ_OPACITY;
document.getElementById('lbl-alpha').textContent = VIZ_OPACITY.toFixed(2);
document.getElementById('ctrl-alpha').addEventListener('input', e => {
  document.getElementById('lbl-alpha').textContent = parseFloat(e.target.value).toFixed(2); draw();
});

/* ── Load PNG grid ── */
document.getElementById('loading').style.display = '';
loadKtPng(CONFIG.ktUrl, {}).then(data => {
  document.getElementById('loading').style.display = 'none';
  KT_DATA = data;

  /* Stats across all nodes */
  let maxKt = 0, sumKt = 0, count = 0;
  const nCells = KT_NLATS * KT_NLONS * KT_NMONTHS;
  for (let k = 0; k < nCells; k++) {
    const v = KT_DATA[k];
    if (v > maxKt) maxKt = v;
    sumKt += v;
    count++;
  }

  document.getElementById('st-grid').textContent = `${KT_NLATS}×${KT_NLONS} @ ${KT_STEP}°`;
  document.getElementById('st-max').textContent  = (maxKt / 100).toFixed(2);
  document.getElementById('st-mean').textContent = count ? (sumKt / count / 100).toFixed(2) : '-';

  draw();
}).catch(err => {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('st-grid').textContent = 'Error: ' + err.message;
  console.error('Failed to load Kt grid:', err);
});

/* ── Hi-res tiles (CONFIG.KT_TILES) — load each, show the toggle, redraw ── */
(typeof KT_TILES !== 'undefined' ? KT_TILES : []).forEach(meta => {
  loadKtPng(meta.url, {}).then(data => {
    KT_TILE_LAYERS.push({ meta, data, canvas: null, builtMonth: -1 });
    document.getElementById('tile-ctrl').style.display = '';
    document.getElementById('lbl-tiles').textContent = KT_TILE_LAYERS.map(l => l.meta.iso).join(', ');
    draw();
  }).catch(err => console.warn('Kt tile load failed', meta.url, err.message));
});
document.getElementById('ctrl-tiles').addEventListener('change', draw);
</script>
<script>/* refit Leaflet after the shared chrome lays out */
function _vizFit(){ try { map.invalidateSize(); } catch (e) {} }
addEventListener('load', _vizFit); setTimeout(_vizFit, 350);</script>
</body>
</html>
