<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Extreme Wind Grid (vb,0) - Solar PV Tool</title>
  <link rel="stylesheet" href="vendor/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css?v=1.2.11">
  <link rel="stylesheet" href="vendor/leaflet.css"/>
  <script>
    (function () {
      var m = document.cookie.match(/(?:^|;\s*)theme=(light|dark)/);
      var dark = m ? m[1] === 'dark' : matchMedia('(prefers-color-scheme:dark)').matches;
      document.documentElement.setAttribute('data-bs-theme', dark ? 'dark' : 'light');
    })();
  </script>
</head>
<body data-page="viz-extremewind">

<div class="site-shell">
  <div id="site-topbar"></div>
  <div class="site-body">
    <nav id="site-stepper"></nav>
    <div class="site-content">
      <div class="viz-bar">
        <h1>💨 Extreme Wind - basic wind velocity vb,0 · 0.1°×0.1° (global, normalised)<span title="Indicative screening map of basic wind velocity, NORMALISED to the common EN definition: 10-min mean at 10 m, open terrain, 50-yr return, m/s. ~37 European countries painted below the national level (province / municipality / NA-zonation, from National Annexes + the Dlubal Geo-Zone tool). Intercontinental national codes, converted with documented factors (SCIENCE.md 12.6): USA ASCE 7-22 (mph, 3-s gust, 300-yr) x0.447/1.43x0.90; India IS 875-3 (3-s gust) /1.43; Brazil NBR 6123 (3-s gust) /1.43; Canada NBC 2020 (hourly pressure) x1.06; Mexico CFE Viento 2020 (km/h, 3-s gust) /3.6/1.43; Japan AIJ-RLB (10-min, 100-yr) x0.92; Australia AS/NZS 1170.2 (region V_R, 3-s gust) /1.43; China GB 50009 + Russia SP 20.13330 (already 10-min). Each cell takes its centre value. CAUTION: a single return-period factor over-states tropical-cyclone coasts. NOT the legal wind map - verify the standard for design." style="font-size:14px;color:var(--text3);opacity:.7;cursor:help;margin-left:7px;vertical-align:middle" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity='.7'">ⓘ</span></h1>
        <div class="sep"></div>
        <div id="stats">
          <span>Size: <b id="st-grid">1801×3601</b></span>
          <span>Countries: <b id="st-countries">-</b></span>
          <span>Range: <b id="st-range">-</b></span>
          <span>Mean: <b id="st-mean">-</b></span>
          <span>Visible: <b id="st-visible">-</b></span>
        </div>
      </div>

<div id="map-wrap">
  <div id="map"></div>
  <canvas id="overlay"></canvas>

  <div id="controls">
    <h3>Display</h3>
    <div class="ctrl-row"><label>Opacity</label>
      <input type="range" id="ctrl-alpha" min="0.1" max="1" step="0.05">
      <span class="val" id="lbl-alpha"></span></div>
    <div id="loading">Loading PNG…</div>
  </div>

  <div id="legend">
    <h3>vb,0 - basic wind velocity (m/s)</h3>
    <div id="leg-ramp"></div>
  </div>
</div>

      </div><!-- /#map-wrap -->
    </div><!-- /.site-content -->
  </div><!-- /.site-body -->
</div><!-- /.site-shell -->

<div id="tooltip"></div>

<script src="vendor/bootstrap.bundle.min.js"></script>
<script src="js/i18n_en.js?v=1.2.11"></script>
<script src="js/i18n_ro.js?v=1.2.11"></script>
<script src="js/i18n.js?v=1.2.11"></script>
<script src="js/theme.js?v=1.2.11"></script>
<script src="js/project-state.js?v=1.2.11"></script>
<script src="js/site-map.js?v=1.2.11"></script>
<script src="js/share.js?v=1.2.11"></script>
<script src="js/site-nav.js?v=1.2.11"></script>

<script src="vendor/leaflet.js"></script>
<script src="js/viz-basemap.js?v=1.2.11"></script>
<script src="js/config.js?v=1.2.11"></script>
<script src="js/grid-deshuffle.js?v=1.2.11"></script>
<script src="js/extremewind-png.js?v=1.2.11"></script>
<script>

const NLATS = EXTREMEWIND_NLATS, NLONS = EXTREMEWIND_NLONS, STEP = EXTREMEWIND_STEP, HALF = STEP / 2;
let WIND = null;

/* Continuous rainbow fade 20→55 m/s, interpolated in RGB so every 1 m/s is its own shade.
   Blue (low) -> cyan -> yellow -> orange -> red -> maroon -> magenta -> purple (extreme).
   Extends to 55 for India IS 875-3 (basic wind speed Vb, 3-s gust); EN vb,0 tops out ~36-48. */
const VB_STOPS = [
  [20, [ 49,  88, 168]],   // #3158a8 deep blue
  [22, [ 44, 127, 184]],   // #2c7fb8 blue
  [24, [ 65, 182, 196]],   // #41b6c4 cyan
  [26, [127, 205, 187]],   // #7fcdbb teal
  [28, [253, 216,  53]],   // #fdd835 yellow
  [30, [251, 140,   0]],   // #fb8c00 orange
  [32, [215,  48,  39]],   // #d73027 red
  [34, [159,  18,  57]],   // #9f1239 dark red
  [36, [109,   0,  25]],   // #6d0019 maroon
  [40, [142,   0,  82]],   // #8e0052 dark magenta
  [45, [168,   3, 147]],   // #a80393 magenta
  [50, [123,  31, 162]],   // #7b1fa2 purple
  [55, [ 74,  20, 140]],   // #4a148c deep purple (IS 875 max)
];
document.getElementById('leg-ramp').innerHTML = vizLegendBar(VB_STOPS,
  [{ v: 20, label: '&le;20' }, { v: 28, label: '28' }, { v: 36, label: '36' },
   { v: 44, label: '44' }, { v: 55, label: '&ge;55' }]);
/* Colour lookup table by pixel value (px = round(vb0 * SCALE), 0-255) - precomputed once so the
   ramp interpolation never runs per cell. _vbLUT[px] = [r,g,b] (null = no data). */
const _SCALE = (typeof EXTREMEWIND_SCALE !== 'undefined') ? EXTREMEWIND_SCALE : 4;
const _vbLUT = (function () {
  const lut = new Array(256);
  for (let px = 0; px < 256; px++) {
    const v = px / _SCALE;
    if (v <= 0) { lut[px] = null; continue; }
    let c;
    if (v <= VB_STOPS[0][0]) c = VB_STOPS[0][1];
    else if (v >= VB_STOPS[VB_STOPS.length - 1][0]) c = VB_STOPS[VB_STOPS.length - 1][1];
    else for (let k = 1; k < VB_STOPS.length; k++) if (v <= VB_STOPS[k][0]) {
      const a = VB_STOPS[k - 1], b = VB_STOPS[k], t = (v - a[0]) / (b[0] - a[0]);
      c = [a[1][0] + (b[1][0] - a[1][0]) * t, a[1][1] + (b[1][1] - a[1][1]) * t, a[1][2] + (b[1][2] - a[1][2]) * t];
      break;
    }
    lut[px] = [Math.round(c[0]), Math.round(c[1]), Math.round(c[2])];
  }
  return lut;
})();
function vbColor(v) { const c = v > 0 ? _vbLUT[Math.min(255, Math.round(v * _SCALE))] : null; return c ? `rgb(${c[0]},${c[1]},${c[2]})` : null; }

const map = L.map('map').setView([50, 12], 4);
vizBasemap(map);

const canvas = document.getElementById('overlay');
const ctx    = canvas.getContext('2d');
function resize() { const r = canvas.parentElement.getBoundingClientRect(); canvas.width = r.width; canvas.height = r.height; }

/* Pre-render the whole grid to an offscreen canvas ONCE (equirectangular, NLONS x NLATS, image
   row 0 = north). Then draw() just blits it - so per-frame cost is O(rows), not O(cells). */
let gridCanvas = null;
function buildGridCanvas() {
  gridCanvas = document.createElement('canvas');
  gridCanvas.width = NLONS; gridCanvas.height = NLATS;
  const g = gridCanvas.getContext('2d');
  const img = g.createImageData(NLONS, NLATS), d = img.data;
  for (let i = 0; i < NLATS; i++) {
    const base = (NLATS - 1 - i) * NLONS;        // flip: image row 0 = lat +90 (north)
    const grow = i * NLONS;
    for (let j = 0; j < NLONS; j++) {
      const v = WIND[grow + j];
      if (v > 0) { const c = _vbLUT[Math.min(255, Math.round(v * _SCALE))]; if (c) { const o = (base + j) * 4; d[o] = c[0]; d[o + 1] = c[1]; d[o + 2] = c[2]; d[o + 3] = 255; } }
    }
  }
  g.putImageData(img, 0, 0);
}

function draw() {
  if (!gridCanvas) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.globalAlpha = parseFloat(document.getElementById('ctrl-alpha').value);
  ctx.imageSmoothingEnabled = false;
  const bnd = map.getBounds();
  const iMin = Math.max(0,       Math.floor((bnd.getSouth() + 90)  / STEP) - 1);
  const iMax = Math.min(NLATS-1, Math.ceil ((bnd.getNorth() + 90)  / STEP) + 1);
  const jMin = Math.max(0,       Math.floor((bnd.getWest()  + 180) / STEP) - 1);
  const jMax = Math.min(NLONS-1, Math.ceil ((bnd.getEast()  + 180) / STEP) + 1);
  document.getElementById('loading').style.display = 'none';
  if (iMax < iMin || jMax < jMin) return;
  /* longitude is linear in pixels: map src columns [jMin..jMax] to dest [xL..xR] once */
  const lonL = -180 + jMin * STEP - HALF, lonR = -180 + jMax * STEP + HALF;
  const xL = map.latLngToContainerPoint([0, lonL]).x;
  const xR = map.latLngToContainerPoint([0, lonR]).x;
  const dw = xR - xL, sx = jMin, sw = jMax - jMin + 1;
  /* one strip per latitude row, placed at its Mercator y (handles lat distortion) */
  for (let i = iMin; i <= iMax; i++) {
    const yT = map.latLngToContainerPoint([-90 + i * STEP + HALF, lonL]).y;
    const yB = map.latLngToContainerPoint([-90 + i * STEP - HALF, lonL]).y;
    if (yB <= yT) continue;
    ctx.drawImage(gridCanvas, sx, NLATS - 1 - i, sw, 1, xL, yT, dw, yB - yT);
  }
  document.getElementById('st-visible').textContent = '~' + ((iMax - iMin + 1) * sw).toLocaleString();
}

function load() {
  WIND = null;
  document.getElementById('loading').style.display = '';
  loadExtremeWindPng(CONFIG.extremeWindUrl).then(data => {
    WIND = data;
    let mn = Infinity, mx = 0, sum = 0, n = 0;
    for (let k = 0; k < WIND.length; k++) { const v = WIND[k]; if (v > 0) { n++; sum += v; if (v < mn) mn = v; if (v > mx) mx = v; } }
    document.getElementById('st-countries').textContent = n.toLocaleString() + ' cells';
    document.getElementById('st-range').textContent = n ? `${mn.toFixed(1)} – ${mx.toFixed(1)} m/s` : '-';
    document.getElementById('st-mean').textContent  = n ? (sum / n).toFixed(1) + ' m/s' : '-';
    buildGridCanvas();
    draw();
  }).catch(err => {
    console.error('Failed to load extreme-wind PNG:', err);
    document.getElementById('st-grid').textContent = 'Error: ' + err.message;
    document.getElementById('loading').style.display = 'none';
  });
}

map.on('move zoom moveend zoomend', draw);
window.addEventListener('resize', () => { resize(); draw(); });
resize();

const tip = document.getElementById('tooltip');
/* debounce: compute + show the readout only when the mouse STOPS (was rebuilding the tooltip on
   every mousemove - heavy: lat/lon math + innerHTML). */
let _tipTimer = null, _tipEv = null;
function _renderTip() {
  const e = _tipEv; if (!e) return;
  if (!WIND) { tip.style.display = 'none'; return; }
  const rect = canvas.getBoundingClientRect();
  const cpt  = map.containerPointToLatLng([e.clientX - rect.left, e.clientY - rect.top]);
  const iLat = Math.round((cpt.lat + 90) / STEP), iLon = Math.round((cpt.lng + 180) / STEP);
  if (iLat < 0 || iLat >= NLATS || iLon < 0 || iLon >= NLONS) { tip.style.display = 'none'; return; }
  const v = WIND[iLat * NLONS + iLon];
  if (v <= 0) { tip.style.display = 'none'; return; }
  const fnum = x => (+x).toFixed(2).replace(/\.?0+$/, '');   // 2 dp, strip trailing zeros
  const gLat = -90 + iLat * STEP, gLon = -180 + iLon * STEP;
  tip.innerHTML =
    `<b style="color:${vbColor(v)}">vb,0 = ${fnum(v)} m/s</b><br>` +
    `<span style="font-size:10px;color:#888">EN 1991-1-4 (indicative · per-country)</span><br>` +
    `Grid node: ${gLat >= 0 ? fnum(gLat) + '°N' : fnum(-gLat) + '°S'}, ${gLon >= 0 ? fnum(gLon) + '°E' : fnum(-gLon) + '°W'} (±${fnum(HALF)}°)`;
  tip.style.display = 'block';
  const tipW = tip.offsetWidth || 200;
  tip.style.left = ((e.clientX + 14 + tipW > window.innerWidth) ? (e.clientX - tipW - 10) : (e.clientX + 14)) + 'px';
  tip.style.top  = (e.clientY - 10) + 'px';
}
const _mapWrap = document.getElementById('map-wrap');
_mapWrap.addEventListener('mousemove', e => {
  _tipEv = { clientX: e.clientX, clientY: e.clientY };
  if (tip.style.display !== 'none') tip.style.display = 'none';   // drop the stale tip while moving
  if (_tipTimer) clearTimeout(_tipTimer);
  _tipTimer = setTimeout(_renderTip, 90);
});
_mapWrap.addEventListener('mouseleave', () => { if (_tipTimer) { clearTimeout(_tipTimer); _tipTimer = null; } tip.style.display = 'none'; });

document.getElementById('ctrl-alpha').value = (typeof VIZ_OPACITY !== 'undefined') ? VIZ_OPACITY : 0.7;
document.getElementById('lbl-alpha').textContent = parseFloat(document.getElementById('ctrl-alpha').value).toFixed(2);
document.getElementById('ctrl-alpha').addEventListener('input', e => { document.getElementById('lbl-alpha').textContent = parseFloat(e.target.value).toFixed(2); draw(); });

load();
</script>
<script>function _vizFit(){ try { map.invalidateSize(); } catch (e) {} } addEventListener('load', _vizFit); setTimeout(_vizFit, 350);</script>
</body>
</html>
