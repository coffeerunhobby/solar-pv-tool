# Deploy on tag — build, gate on the tests, then run deploy.sh to S3 + CloudFront.
# Trigger:  git tag v1.2.5 && git push origin v1.2.5
# Secrets required (repo → Settings → Secrets and variables → Actions):
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY  (scoped: S3 to solar-pv-tool + CloudFront invalidation)
# Region, bucket, and dist id live in deploy.sh (not secret).
name: Deploy

on:
  push:
    tags: ["v*.*.*"]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      - name: Install deps + build
        run: |
          npm ci
          npm --prefix app ci
          npm --prefix app run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # Gate: never ship a build that fails the mocked or accuracy suites.
      - name: Test gate (mocked + engine-vs-PVGIS accuracy)
        env:
          SPV_BASE_URL: http://localhost:4173
          TESTVIZ_URL: http://localhost:8091/testViz.html
          CI: "true"
        run: |
          python3 -m http.server 8091 >/tmp/legacy.log 2>&1 &
          npm --prefix app run preview >/tmp/preview.log 2>&1 &
          for i in $(seq 1 40); do
            curl -sf http://localhost:8091/js/config.js >/dev/null 2>&1 \
              && curl -sf http://localhost:4173/ >/dev/null 2>&1 && break
            sleep 2
          done
          npm run test:mocked
          npm run test:accuracy

      - name: Deploy to S3 + CloudFront
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-central-1
        run: bash deploy.sh
