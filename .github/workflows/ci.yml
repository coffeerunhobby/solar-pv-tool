# CI — build the SPA shell + run the credential-free mocked Playwright suite
# against the PR's OWN build (not production). No secrets needed.
#
# Deploy + Android/iOS + the testViz accuracy gate are separate workflows (later
# slices). This one is the "does it build and still pass" gate on every push/PR.
name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      # Two package roots: root = Playwright only; app/ = Vite + React.
      # A fresh `npm ci` per run gives Linux-native binaries — CI sidesteps the
      # macOS/Windows shared-node_modules problem entirely.
      - name: Install deps
        run: |
          npm ci
          npm --prefix app ci

      - name: Build SPA shell
        run: npm --prefix app run build

      # Guard: the shell must never reference the deleted legacy chrome (double-load).
      - name: Guard shell integrity
        run: |
          grep -q 'assets/index-' app/dist/index.html \
            || { echo "::error::built shell has no hashed asset ref — bad build"; exit 1; }
          if grep -qE 'js/(gate|site-nav|app)\.js' app/dist/index.html; then
            echo "::error::shell references deleted legacy chrome (gate/site-nav/app)"; exit 1;
          fi

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # Serve the legacy asset layer (:8091, /js /css /vendor /data + unported pages)
      # and the built SPA (vite preview :4173, proxies the above), then run the mocked
      # suite against the local build. Servers background in this same shell.
      - name: Serve build + run mocked suite
        env:
          SPV_BASE_URL: http://localhost:4173
          CI: "true"
        run: |
          python3 -m http.server 8091 >/tmp/legacy.log 2>&1 &
          npm --prefix app run preview >/tmp/preview.log 2>&1 &
          echo "waiting for :8091 and :4173…"
          for i in $(seq 1 40); do
            if curl -sf http://localhost:8091/js/config.js >/dev/null 2>&1 \
               && curl -sf http://localhost:4173/ >/dev/null 2>&1; then
              echo "servers up"; break
            fi
            sleep 2
          done
          npm run test:mocked

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/report
          retention-days: 7
