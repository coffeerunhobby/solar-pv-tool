<!doctype html>
<html lang="ro" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="robots" content="noindex">
  <title>Earth Energy Engine</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/vendor/bootstrap.min.css">
  <link rel="stylesheet" href="/css/style.css?v=__APP_VERSION__">
  <!-- set theme before paint to avoid flash (verbatim from the legacy pages) -->
  <script>
    (function () {
      var m = document.cookie.match(/(?:^|;\s*)theme=(light|dark)/);
      var dark = m ? m[1] === 'dark' : matchMedia('(prefers-color-scheme:dark)').matches;
      document.documentElement.setAttribute('data-bs-theme', dark ? 'dark' : 'light');
    })();
  </script>
</head>
<body>
  <!-- display:contents keeps #root transparent to the .site-shell flex/height layout -->
  <div id="root" style="display:contents"></div>

  <!-- ══ Legacy foundation — CLASSIC scripts (top-level const stays global), dependency order.
       Reused UNCHANGED from js/. Deliberately NOT loaded: gate.js, site-nav.js, app.js
       (replaced by React), bootstrap.bundle.min.js (only site-nav.js used it).
       LEAN SET: each migration phase adds the scripts its ported pages need —
       P2: vendor/chart.umd.js, explain.js, canvas.js, obstacles.js, solar-geometry.js, convention.js …
       P4: yield engine chain, leaflet+map.js (lazy), schema/pt engines.  ══ -->

  <script src="/js/config.js?v=__APP_VERSION__"></script>
